<body>
  <div id="loading-screen">
    <div id="loading-title">小小城市</div>
    <div id="loading-bar">
      <div id="loading-fill"></div>
    </div>
    <div id="loading-count">0 / 34</div>
    <div id="loading-text">正在加载资源...</div>
  </div>

  <div id="app"></div>

  <div id="fps-display">FPS: --</div>
  <button id="perf-toggle" onclick="togglePerfMenu()">⚡</button>
  <div id="perf-menu">
    <button class="perf-btn" onclick="setPerfMode('low')">🔰 低配</button>
    <button class="perf-btn active" onclick="setPerfMode('medium')">⚡ 均衡</button>
    <button class="perf-btn" onclick="setPerfMode('high')">🚀 高性能</button>
    <button class="perf-btn" onclick="setPerfMode('ultra')">💀 极限</button>
  </div>

  <script>
    var menuVisible = false;
    var loadedCount = 0;
    var totalCount = 34;

    function togglePerfMenu() {
      menuVisible = !menuVisible;
      document.getElementById('perf-menu').classList.toggle('show', menuVisible);
    }

    function setPerfMode(mode) {
      if (window.__setPerformanceMode) window.__setPerformanceMode(mode);
      document.querySelectorAll('.perf-btn').forEach(function(b) { b.classList.remove('active'); });
      event.target.classList.add('active');
      document.getElementById('perf-menu').classList.remove('show');
      menuVisible = false;
    }

    function updateFPS() {
      var fps = window.__getFPS ? window.__getFPS() : 0;
      document.getElementById('fps-display').textContent = 'FPS: ' + (fps || '--');
      requestAnimationFrame(updateFPS);
    }
    updateFPS();

    window.__hideLoading = function() {
      document.getElementById('loading-screen').classList.add('hidden');
    };

    window.__setLoadingProgress = function(p, text) {
      document.getElementById('loading-fill').style.width = p + '%';
      if (text) document.getElementById('loading-text').textContent = text;
    };

    window.__onModelLoaded = function(name) {
      loadedCount++;
      document.getElementById('loading-count').textContent = loadedCount + ' / ' + totalCount;
      document.getElementById('loading-text').textContent = '已加载: ' + name;
    };

    window.__setTotalModels = function(total) {
      totalCount = total;
      document.getElementById('loading-count').textContent = loadedCount + ' / ' + totalCount;
    };

    function startPreload() {
      if (window.preloadManager) {
        console.log('[LOADER] 开始预加载资源...');
        window.preloadManager.on('progress', function(data) {
          console.log('[LOADER] 进度:', data.progress + '%');
        });
        window.preloadManager.on('complete', function(data) {
          console.log('[LOADER] 预加载完成:', data.loaded, '/', data.total);
          window.__hideLoading();
        });
        window.preloadManager.start();
      } else {
        console.warn('[LOADER] 预加载管理器未找到');
      }
    }

    window.addEventListener('load', function() {
      startPreload();
    });
  </script>
